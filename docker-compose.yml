services:
  sparkfish:
    # Upstream MiroFish image (AGPL-3.0)
    # Replace with sparkpitlabs/sparkfish once a SparkFish image is published
    image: ghcr.io/666ghj/mirofish:latest
    container_name: sparkfish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads